name: Build and Push Docker Images

on:
  schedule:
    - cron: '0 4 * * *'  # Run daily, check for new upstream releases
  push:
    branches:
      - master
    paths:
      - 'Dockerfile'
      - 'Dockerfile.alpine'
      - 'entrypoint.sh'
      - 'GPGparams.txt'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Proton Mail Bridge version to build (e.g. v3.25.0). Leave empty for latest.'
        required: false
        default: ''

concurrency:
  group: build-and-push
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Get Proton Mail Bridge version
        id: get-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(curl -s https://api.github.com/repos/ProtonMail/proton-bridge/releases/latest | jq -r .tag_name)
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not determine Proton Mail Bridge version" >&2
            exit 1
          fi
          echo "Proton Mail Bridge version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if this version was already published
        id: check
        run: |
          # Scheduled runs only rebuild when the version tag is not yet on ghcr.io.
          # Pushes and manual runs always build.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by ${{ github.event_name }}: building."
            exit 0
          fi
          IMAGE="ghcr.io/${{ github.repository_owner }}/proton-mail-bridge:${{ steps.get-version.outputs.version }}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "$IMAGE already exists: nothing to do."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "$IMAGE not found: building."
          fi

  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Debian image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ENV_PROTONMAIL_BRIDGE_VERSION=${{ env.VERSION }}
          cache-from: type=gha,scope=debian
          cache-to: type=gha,scope=debian,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/proton-mail-bridge:latest
            ghcr.io/${{ github.repository_owner }}/proton-mail-bridge:debian
            ghcr.io/${{ github.repository_owner }}/proton-mail-bridge:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/proton-mail-bridge:${{ env.VERSION }}-debian
            ${{ secrets.DOCKERHUB_USERNAME }}/proton-mail-bridge:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/proton-mail-bridge:debian
            ${{ secrets.DOCKERHUB_USERNAME }}/proton-mail-bridge:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/proton-mail-bridge:${{ env.VERSION }}-debian

      - name: Build and push Alpine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.alpine
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ENV_PROTONMAIL_BRIDGE_VERSION=${{ env.VERSION }}
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,scope=alpine,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/proton-mail-bridge:alpine
            ghcr.io/${{ github.repository_owner }}/proton-mail-bridge:${{ env.VERSION }}-alpine
            ${{ secrets.DOCKERHUB_USERNAME }}/proton-mail-bridge:alpine
            ${{ secrets.DOCKERHUB_USERNAME }}/proton-mail-bridge:${{ env.VERSION }}-alpine

      - name: Update README changelog with new version
        run: |
          CURRENT_DATE=$(date +"%Y/%m/%d")
          ENTRY="* $CURRENT_DATE: updated to Proton Mail Bridge $VERSION"
          # Prepend a new changelog entry above the most recent one (keeping
          # history), but only once per version.
          if ! grep -qF "updated to Proton Mail Bridge $VERSION" README.md; then
            sed -i "0,/^\* [0-9]\{4\}\//s||$ENTRY\n&|" README.md
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update to Proton Mail Bridge ${{ needs.check-version.outputs.version }}"
          file_pattern: "README.md"

      - name: Sync README to Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/proton-mail-bridge
          short-description: "Proton Mail Bridge (CLI) in Docker - local SMTP/IMAP server for your Proton account"
          readme-filepath: ./README.md
