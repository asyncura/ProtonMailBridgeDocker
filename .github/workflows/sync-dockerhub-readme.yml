name: Sync README to Docker Hub

# Keeps the Docker Hub repository description in sync with README.md.
# The build workflow also syncs after prepending a changelog entry; this
# workflow covers README-only edits without triggering an image rebuild.
on:
  push:
    branches:
      - master
    paths:
      - 'README.md'
      - '.github/workflows/sync-dockerhub-readme.yml'
  workflow_dispatch:

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync README to Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/proton-mail-bridge
          short-description: "Proton Mail Bridge (CLI) in Docker - local SMTP/IMAP server for your Proton account"
          readme-filepath: ./README.md