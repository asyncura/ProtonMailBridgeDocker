# Proton Mail Bridge - Alpine image (lightweight)
# Note: expects the external docker network "network20" to exist:
#   docker network create --subnet 172.20.0.0/16 network20
services:
    protonmail-bridge:
        container_name: protonmail_bridge_alpine
        image: ghcr.io/asyncura/proton-mail-bridge:alpine
        volumes:
            - mail_data:/root
        environment:
            - CONTAINER_SMTP_PORT=25
            - CONTAINER_IMAP_PORT=143
        ports:
            - "127.0.0.1:15025:25/tcp"
            - "127.0.0.1:15143:143/tcp"
        networks:
            - network20
        restart: unless-stopped
networks:
    network20:
        external: true
        name: network20
volumes:
    mail_data:
